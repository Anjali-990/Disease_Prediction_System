{% extends 'parent.html' %}

{% block main %}

<div class="container mt-5">
  <h3 class="text-center">Forgot Password</h3>

  <form method="POST">
    {% csrf_token %}

    <input type="email" class="form-control" placeholder="Enter Email">

    <br>

    <button class="btn btn-primary">Send OTP</button>

  </form>
</div>

{% endblock %}
